name: Build and onela.cn

# 触发条件：当推送到 main 分支时
on:
  push:
    branches:
      - main
# 定义环境变量
env:
    OUTPUT_DIR: onela-cn  # 将 "dist" 定义为变量，可随时修改
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. 安装依赖
      - name: Install dependencies
        run: npm i

      # 4. 编译 TypeScript
      - name: Build TypeScript
        run: npm run build

      # 5. 获取版本号（使用短 commit SHA）
      - name: Get version
        id: version
        run: echo "VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # 6. 创建 tar 文件（包含版本号）
      - name: Create tar archive with version
        run: tar -czf ${{ env.OUTPUT_DIR }}-${{ steps.version.outputs.VERSION }}.tar.gz -C dist .

      # 7. 创建 Release
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          release_name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false

      # 8. 上传 tar 文件到 Release
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./${{ env.OUTPUT_DIR }}-${{ steps.version.outputs.VERSION }}.tar.gz
          asset_name: ${{ env.OUTPUT_DIR }}-${{ steps.version.outputs.VERSION }}.tar.gz
          asset_content_type: application/gzip