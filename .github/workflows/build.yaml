name: Build and onela.cn

# 触发条件：当推送到 main 分支时
on:
  push:
    branches:
      - main
# 定义环境变量
env:
    OUTPUT_DIR: onela-cn  # 将 "dist" 定义为变量，可随时修改
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. 安装依赖
      - name: Install dependencies
        run: npm i

      # 4. 编译 TypeScript
      - name: Build TypeScript
        run: npm run build

      # 5. 获取版本号（使用短 commit SHA）
      - name: Get version
        id: version
        run: echo "VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # 6. 创建 tar 文件（包含版本号）
      - name: Create tar archive with version
        run: tar -czf ${{ env.OUTPUT_DIR }}-${{ steps.version.outputs.VERSION }}.tar.gz -C dist .

      # 7. 创建 Release 并上传文件
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          files: ./${{ env.OUTPUT_DIR }}-${{ steps.version.outputs.VERSION }}.tar.gz
          make_latest: true

      # 9. 部署到服务器
      - name: Deploy to server
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT }}
          SOURCE: dist/
          TARGET: /data/www/onela.cn/
          ARGS: "-rlgoDzvc -i --delete"